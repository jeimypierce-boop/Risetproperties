version: '3.8'

services:
  web:
    image: php:8.0-apache
    container_name: risetproperties_web
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: riset_properties
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: risetproperties_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: riset_properties
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
